<!DOCTYPE html>
<html class="light" lang="es" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Selecto Granos | Pedido confirmado</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#6f4627",
                    "on-primary": "#ffffff",
                    secondary: "#566250",
                    "on-secondary": "#ffffff",
                    background: "#fff8f0",
                    "on-background": "#1e1b14",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#fbf3e6",
                    "surface-container": "#f5ede0",
                    "outline-variant": "#d5c3b8",
                    "on-surface-variant": "#51443c"
                },
                borderRadius: {
                    DEFAULT: "1rem",
                    lg: "2rem",
                    xl: "3rem",
                    full: "9999px"
                },
                fontFamily: {
                    headline: ["Noto Serif"],
                    body: ["Manrope"],
                    label: ["Manrope"]
                }
            }
        }
    };
</script>
<style>
    body { font-family: 'Manrope', sans-serif; background: #fff8f0; color: #1e1b14; }
    button:focus-visible,
    a:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    [role="button"]:focus-visible {
        outline: 2px solid #6f4627;
        outline-offset: 2px;
    }
    .checkmark-circle {
        width: 6rem;
        height: 6rem;
        border-radius: 9999px;
        border: 3px solid #566250;
        position: relative;
        margin: 0 auto;
    }
    .checkmark-stem {
        position: absolute;
        width: 0.2rem;
        height: 2rem;
        background-color: #566250;
        left: 2.8rem;
        top: 2.6rem;
        transform: rotate(45deg);
        transform-origin: top;
    }
    .checkmark-kick {
        position: absolute;
        width: 0.2rem;
        height: 1rem;
        background-color: #566250;
        left: 2rem;
        top: 3.5rem;
        transform: rotate(-45deg);
        transform-origin: top;
    }
    @media (prefers-reduced-motion: no-preference) {
        .checkmark-circle { animation: pop 500ms cubic-bezier(0.4, 0, 0.2, 1) both; }
        .checkmark-stem { animation: stem 400ms 250ms linear both; }
        .checkmark-kick { animation: kick 250ms 400ms linear both; }
    }
    @keyframes pop {
        0% { transform: scale(0.7); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }
    @keyframes stem {
        0% { height: 0; }
        100% { height: 2rem; }
    }
    @keyframes kick {
        0% { height: 0; }
        100% { height: 1rem; }
    }
</style>
</head>
<body class="min-h-screen bg-background text-on-background">
<main class="max-w-3xl mx-auto px-5 md:px-8 py-12 md:py-20">
    <section class="bg-surface-container-lowest rounded-xl border border-outline-variant/60 p-6 md:p-10 text-center">
        <div class="checkmark-circle mb-6" aria-hidden="true">
            <span class="checkmark-stem"></span>
            <span class="checkmark-kick"></span>
        </div>

        <p class="font-label text-[10px] uppercase tracking-[0.25em] text-secondary mb-2">Pedido confirmado</p>
        <h1 class="font-headline text-4xl md:text-5xl text-primary mb-2">Gracias por tu compra</h1>
        <p class="text-on-surface-variant mb-6">Tu orden está en preparación. Te esperamos en caja para entrega.</p>

        <div class="bg-surface-container rounded-xl p-4 mb-8 inline-block min-w-[220px]">
            <p class="text-xs uppercase tracking-widest text-on-surface-variant">Número de orden</p>
            <p id="order-id" class="font-headline text-4xl text-primary">----</p>
        </div>

        <div class="text-left bg-surface-container-low rounded-xl p-4 md:p-5 mb-8">
            <h2 class="font-headline text-2xl text-primary mb-4">Resumen</h2>
            <div id="order-items" class="space-y-3"></div>
            <div class="mt-4 pt-3 border-t border-outline-variant/70 flex items-center justify-between">
                <span class="text-on-surface-variant">Total</span>
                <strong id="order-total" class="font-headline text-2xl text-primary">$0.00</strong>
            </div>
        </div>

        <p class="text-sm text-on-surface-variant mb-8">Tiempo estimado de preparación: 8-12 minutos.</p>

        <a href="/" class="inline-flex items-center justify-center w-full md:w-auto bg-primary text-on-primary px-8 py-4 rounded-full font-label uppercase tracking-widest text-xs md:text-sm hover:opacity-90 active:scale-95">Volver al menú</a>
    </section>
</main>

<script src="/static/stitch-ui/api-helper.js"></script>
<script src="/static/stitch-ui/cart.js"></script>
<script>
function formatCurrency(value) {
    return `$${Number(value).toFixed(2)}`;
}

function randomOrderId() {
    return String(Math.floor(1000 + Math.random() * 9000));
}

function renderOrder() {
    const params = new URLSearchParams(window.location.search);
    const orderIdFromUrl = params.get('order_id');

    const snapshot = window.dataManager?.getValue('last_order', null);
    const orderId = orderIdFromUrl || snapshot?.order_id || randomOrderId();

    document.getElementById('order-id').textContent = orderId;

    const itemsEl = document.getElementById('order-items');
    const totalEl = document.getElementById('order-total');

    const items = snapshot?.items || [];
    if (!items.length) {
        itemsEl.innerHTML = '<p class="text-on-surface-variant">No hay productos para mostrar.</p>';
        totalEl.textContent = '$0.00';
        return;
    }

    itemsEl.innerHTML = '';
    items.forEach((item) => {
        const row = document.createElement('div');
        row.className = 'flex items-center justify-between gap-4';
        row.innerHTML = `
            <div>
                <p class="font-medium">${item.name}</p>
                <p class="text-xs uppercase tracking-widest text-on-surface-variant">${item.quantity} x ${formatCurrency(item.price)}</p>
            </div>
            <strong class="text-primary">${formatCurrency(item.quantity * item.price)}</strong>
        `;
        itemsEl.appendChild(row);
    });

    const total = snapshot?.total || items.reduce((acc, item) => acc + (item.price * item.quantity), 0);
    totalEl.textContent = formatCurrency(total);
}

document.addEventListener('DOMContentLoaded', () => {
    renderOrder();
});
</script>
</body>
</html>
