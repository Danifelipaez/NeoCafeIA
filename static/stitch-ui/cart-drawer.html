<div id="cart-overlay" class="fixed inset-0 bg-black/35 opacity-0 pointer-events-none z-[70]"></div>
<aside id="cart-drawer" class="fixed right-0 top-0 h-full w-full max-w-md bg-surface-container-lowest border-l border-outline-variant shadow-2xl z-[80] translate-x-full max-md:top-auto max-md:bottom-0 max-md:h-[78vh] max-md:max-w-none max-md:w-full max-md:rounded-t-3xl max-md:border-l-0 max-md:border-t max-md:translate-y-full max-md:translate-x-0">
    <div class="h-full flex flex-col">
        <header class="flex items-center justify-between px-6 py-4 border-b border-outline-variant/70">
            <div>
                <p class="font-label text-[10px] uppercase tracking-[0.25em] text-secondary">Pedido</p>
                <h2 class="font-headline text-2xl text-primary">Tu carrito</h2>
            </div>
            <button id="cart-close-btn" aria-label="Cerrar carrito" class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface hover:bg-surface-dim active:scale-95">
                <span class="material-symbols-outlined">close</span>
            </button>
        </header>

        <div id="cart-empty" class="flex-1 flex flex-col items-center justify-center px-8 text-center hidden">
            <div class="w-24 h-24 rounded-full bg-secondary-container flex items-center justify-center mb-5">
                <span class="material-symbols-outlined text-secondary text-5xl">shopping_cart</span>
            </div>
            <h3 class="font-headline text-2xl text-primary mb-3">Tu carrito está vacío ☕</h3>
            <p class="text-on-surface-variant mb-6">Explora el menú y agrega tu ritual favorito.</p>
            <button id="cart-empty-cta" class="bg-primary text-on-primary px-6 py-3 rounded-full font-label uppercase tracking-widest text-xs hover:opacity-90 active:scale-95" type="button">Ir al menú</button>
        </div>

        <div id="cart-content" class="flex-1 overflow-y-auto px-6 py-5 space-y-4">
        </div>

        <footer class="border-t border-outline-variant/70 px-6 py-5 space-y-4">
            <div class="flex items-center justify-between">
                <span class="text-on-surface-variant">Total</span>
                <strong id="cart-total" class="font-headline text-2xl text-primary">$0.00</strong>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button id="cart-clear-btn" class="bg-surface-container text-on-surface px-4 py-3 rounded-full font-label uppercase tracking-widest text-xs hover:bg-surface-dim active:scale-95" type="button">Limpiar</button>
                <a id="cart-checkout-btn" href="/checkout" class="bg-primary text-on-primary px-4 py-3 rounded-full text-center font-label uppercase tracking-widest text-xs hover:opacity-90 active:scale-95">Ir al Checkout</a>
            </div>
        </footer>
    </div>
</aside>
