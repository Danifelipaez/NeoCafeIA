<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport"/>
<title>Selecto Granos | Asistente Digital</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#7d6255",
                    "on-primary-container": "#ffe3d1",
                    "tertiary-fixed-dim": "#e1c0b0",
                    "background": "#fff8f0",
                    "on-tertiary-fixed-variant": "#594236",
                    "on-background": "#1e1b14",
                    "surface-tint": "#805533",
                    "error": "#ba1a1a",
                    "primary-fixed-dim": "#f4bb92",
                    "on-secondary-container": "#5c6856",
                    "on-error-container": "#93000a",
                    "on-surface": "#1e1b14",
                    "on-primary": "#ffffff",
                    "secondary-fixed": "#d9e7d0",
                    "secondary-container": "#d9e7d0",
                    "on-error": "#ffffff",
                    "secondary-fixed-dim": "#bdcbb5",
                    "surface-container-highest": "#e9e2d5",
                    "outline-variant": "#d5c3b8",
                    "primary-fixed": "#ffdcc5",
                    "on-secondary": "#ffffff",
                    "surface": "#fff8f0",
                    "on-primary-fixed": "#301400",
                    "surface-dim": "#e1d9cc",
                    "secondary": "#566250",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#ffe2d5",
                    "on-tertiary-fixed": "#29170e",
                    "on-surface-variant": "#51443c",
                    "on-secondary-fixed-variant": "#3e4a39",
                    "primary": "#6f4627",
                    "surface-container": "#f5ede0",
                    "primary-container": "#8b5e3c",
                    "surface-variant": "#e9e2d5",
                    "on-primary-fixed-variant": "#653d1e",
                    "surface-bright": "#fff8f0",
                    "tertiary": "#634a3e",
                    "surface-container-low": "#fbf3e6",
                    "surface-container-high": "#efe7da",
                    "on-secondary-fixed": "#141e10",
                    "inverse-primary": "#f4bb92",
                    "inverse-surface": "#343027",
                    "inverse-on-surface": "#f8f0e3",
                    "tertiary-fixed": "#ffdbcb",
                    "error-container": "#ffdad6",
                    "outline": "#83746b"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Noto Serif"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        }
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-serif { font-family: 'Noto Serif', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .bg-abstract-sand {
            background-color: #fbf3e6;
            clip-path: circle(40% at 90% 10%);
        }
        .bg-abstract-rose {
            background-color: #ffdbcb;
            opacity: 0.4;
            clip-path: ellipse(25% 40% at 10% 80%);
        }
        /* Custom scrollbar for mobile feel */
        .custom-scrollbar::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="bg-background text-on-background h-screen flex flex-col overflow-hidden">
<!-- TopNavBar -->
<nav class="fixed top-0 w-full z-50 bg-white/70 dark:bg-stone-950/70 backdrop-blur-xl border-b border-outline-variant/10">
<div class="flex justify-between items-center w-full px-5 py-4 max-w-7xl mx-auto">
<div class="text-lg font-serif italic text-primary">Selecto Granos</div>
<button class="bg-primary text-on-primary px-5 py-1.5 rounded-full font-label uppercase tracking-widest text-[10px] active:scale-95 transition-transform">Visitar</button>
</div>
</nav>
<!-- Abstract Geometric Accents -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute inset-0 bg-abstract-sand"></div>
<div class="absolute inset-0 bg-abstract-rose"></div>
<div class="absolute top-1/4 right-[-10%] w-48 h-48 bg-tertiary-fixed-dim/15 rounded-full blur-3xl"></div>
</div>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col pt-16 relative h-full">
<!-- Scrollable Chat History -->
<div class="flex-grow overflow-y-auto px-5 pt-8 pb-48 custom-scrollbar">
<!-- Header Text -->
<header class="mb-10">
<span class="font-label text-[9px] uppercase tracking-[0.2em] text-tertiary mb-1.5 block opacity-80">Interacción Curada</span>
<h1 class="font-headline text-3xl text-primary leading-tight">Asistente de Ritual</h1>
</header>
<!-- Messages Stack -->
<div class="space-y-6">
<!-- AI Message -->
<div class="flex flex-col items-start max-w-[90%] animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="bg-surface-container-low border border-outline-variant/15 p-5 rounded-2xl rounded-tl-none shadow-sm">
<p class="font-headline text-primary text-lg leading-relaxed italic">
                        Hola, soy tu asistente de Selecto Granos. ¿En qué puedo ayudarte hoy con tu ritual del café?
                    </p>
</div>
<span class="font-label text-[8px] uppercase tracking-widest text-stone-400 mt-2 ml-1">Asistente Virtual</span>
</div>
<!-- User Message Example (Hidden by default, used for spacing reference) -->
<!-- 
            <div class="flex flex-col items-end max-w-[90%] self-end">
                <div class="bg-secondary text-on-secondary p-5 rounded-2xl rounded-tr-none shadow-sm">
                    <p class="font-body text-sm leading-relaxed">
                        ¿Qué orígenes tienen disponibles para filtrados?
                    </p>
                </div>
                <span class="font-label text-[8px] uppercase tracking-widest text-stone-400 mt-2 mr-1">Tú</span>
            </div>
            -->
</div>
</div>
<!-- Sticky Bottom Interaction Area -->
<div class="fixed bottom-0 left-0 w-full z-40 bg-gradient-to-t from-background via-background/95 to-transparent pt-12">
<div class="max-w-4xl mx-auto px-5 safe-area-bottom pb-6">
<!-- Horizontal Suggestion Chips -->
<div class="flex gap-2 overflow-x-auto pb-4 -mx-5 px-5 no-scrollbar">
<button class="flex-shrink-0 bg-surface-container-lowest border border-outline-variant/15 px-4 py-2 rounded-full text-[10px] font-label uppercase tracking-wider text-primary whitespace-nowrap active:bg-primary active:text-on-primary transition-all">
                    Recomiéndame un café
                </button>
<button class="flex-shrink-0 bg-surface-container-lowest border border-outline-variant/15 px-4 py-2 rounded-full text-[10px] font-label uppercase tracking-wider text-primary whitespace-nowrap active:bg-primary active:text-on-primary transition-all">
                    Ver el menú
                </button>
<button class="flex-shrink-0 bg-surface-container-lowest border border-outline-variant/15 px-4 py-2 rounded-full text-[10px] font-label uppercase tracking-wider text-primary whitespace-nowrap active:bg-primary active:text-on-primary transition-all">
                    Horarios
                </button>
</div>
<!-- Input Bar -->
<div class="relative group mb-4">
<input class="w-full bg-surface-container-lowest border-none py-4 px-6 pr-14 rounded-full shadow-[0_8px_25px_rgba(30,27,20,0.08)] focus:ring-1 focus:ring-primary/20 focus:border-primary transition-all outline-none font-body text-sm text-on-surface placeholder:text-stone-400" placeholder="Tu consulta..." type="text"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 bg-primary text-on-primary rounded-full flex items-center justify-center active:scale-90 transition-transform shadow-lg">
<span class="material-symbols-outlined text-base">arrow_upward</span>
</button>
</div>
<p class="text-center text-[8px] text-stone-400 font-label uppercase tracking-[0.2em] opacity-60">
                The Curated Ritual — IA de Selecto Granos
            </p>
</div>
</div>
</main>
<footer class="sr-only">
    © 2024 Cafetería Selecto Granos. The Curated Ritual.
</footer>
</body></html>
